{{- if .Values.dispatcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "talon.fullname" . }}-dispatcher
  labels:
    {{- include "talon.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher
spec:
  replicas: {{ .Values.dispatcher.replicaCount }}
  selector:
    matchLabels:
      {{- include "talon.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dispatcher
  template:
    metadata:
      labels:
        {{- include "talon.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dispatcher
        {{- with .Values.global.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.dispatcher.serviceAccount.name }}
      containers:
        - name: dispatcher
          image: "{{ .Values.dispatcher.image.repository }}:{{ .Values.dispatcher.image.tag }}"
          imagePullPolicy: {{ default .Values.global.imagePullPolicy .Values.dispatcher.image.pullPolicy }}
          env:
            {{- toYaml .Values.dispatcher.env | nindent 12 }}
          resources:
            {{- toYaml .Values.dispatcher.resources | nindent 12 }}
{{- end }}
