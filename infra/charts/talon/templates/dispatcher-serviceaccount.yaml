{{- if and .Values.dispatcher.enabled .Values.dispatcher.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.dispatcher.serviceAccount.name }}
  labels:
    {{- include "talon.labels" . | nindent 4 }}
  {{- with .Values.dispatcher.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
